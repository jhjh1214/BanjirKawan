services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: banjir
      POSTGRES_PASSWORD: banjir
      POSTGRES_DB: banjirkawan
    ports:
      # Host port 5433 to avoid clashing with a locally installed Postgres;
      # in-network services still use postgres:5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banjir -d banjirkawan"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    environment:
      DATABASE_URL: postgres://banjir:banjir@postgres:5432/banjirkawan
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      DATABASE_URL: postgres://banjir:banjir@postgres:5432/banjirkawan
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
